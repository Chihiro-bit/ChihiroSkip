name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发正式 Release
  workflow_dispatch:   # 支持手动触发（在 Actions 页面点击 Run workflow）

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/ChihiroSkip-${VERSION}.apk"
          echo "APK_PATH=dist/ChihiroSkip-${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_NAME=ChihiroSkip-${VERSION}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "ChihiroSkip ${{ github.ref_name }}"
          body: |
            ## ChihiroSkip ${{ github.ref_name }}

            ### 下载
            点击下方 **Assets** 中的 `ChihiroSkip-${{ github.ref_name }}.apk` 即可下载安装。

            ### 安装说明
            1. 下载 APK 文件到手机
            2. 打开文件管理器，找到下载的 APK
            3. 点击安装（需允许「安装未知来源应用」）
            4. 安装后进入设置开启无障碍服务

            ### 更新日志
            请查看 [提交记录](https://github.com/Chihiro-bit/ChihiroSkip/commits/${{ github.ref_name }}) 了解本版本改动。
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
