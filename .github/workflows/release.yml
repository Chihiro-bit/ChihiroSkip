name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发正式 Release
  workflow_dispatch:   # 支持手动触发，生成预发布版本

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine version and release type
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "VERSION=dev-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/ChihiroSkip-${{ env.VERSION }}.apk"
          echo "APK_PATH=dist/ChihiroSkip-${{ env.VERSION }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChihiroSkip-${{ env.VERSION }}
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "ChihiroSkip ${{ env.VERSION }}"
          prerelease: ${{ env.IS_PRERELEASE }}
          body: |
            ## ChihiroSkip ${{ env.VERSION }}

            ### 下载
            点击下方 **Assets** 中的 `ChihiroSkip-${{ env.VERSION }}.apk` 即可下载安装。

            ### 安装说明
            1. 下载 APK 文件到手机
            2. 打开文件管理器，找到下载的 APK
            3. 点击安装（需允许「安装未知来源应用」）
            4. 安装后进入设置开启无障碍服务

            > 本版本为 Debug 构建，未经签名优化。如需正式签名版本请使用 `v*` tag 发布。
          files: ${{ env.APK_PATH }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
